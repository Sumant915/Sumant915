<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="60%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#090d14"/>
    </linearGradient>
    <radialGradient id="orbCyan" cx="18%" cy="35%" r="45%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#00F5FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbPurple" cx="82%" cy="65%" r="45%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7B61FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7B61FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbCyan2" cx="88%" cy="18%" r="30%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00F5FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00F5FF"/>
      <stop offset="48%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>
    <linearGradient id="divLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0"/>
      <stop offset="35%" stop-color="#00F5FF" stop-opacity="0.7"/>
      <stop offset="65%" stop-color="#7B61FF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7B61FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="bounds"><rect width="1200" height="320"/></clipPath>
  </defs>

  <g clip-path="url(#bounds)">
    <!-- Base background -->
    <rect width="1200" height="320" fill="url(#bg)"/>

    <!-- Glowing orbs -->
    <rect width="1200" height="320" fill="url(#orbCyan)"/>
    <rect width="1200" height="320" fill="url(#orbPurple)"/>
    <rect width="1200" height="320" fill="url(#orbCyan2)"/>

    <!-- Grid lines horizontal -->
    <g stroke="#00F5FF" stroke-width="0.4" opacity="0.07">
      <line x1="0" y1="40" x2="1200" y2="40"/>
      <line x1="0" y1="80" x2="1200" y2="80"/>
      <line x1="0" y1="120" x2="1200" y2="120"/>
      <line x1="0" y1="160" x2="1200" y2="160"/>
      <line x1="0" y1="200" x2="1200" y2="200"/>
      <line x1="0" y1="240" x2="1200" y2="240"/>
      <line x1="0" y1="280" x2="1200" y2="280"/>
    </g>
    <!-- Grid lines vertical -->
    <g stroke="#7B61FF" stroke-width="0.4" opacity="0.06">
      <line x1="120" y1="0" x2="120" y2="320"/>
      <line x1="240" y1="0" x2="240" y2="320"/>
      <line x1="360" y1="0" x2="360" y2="320"/>
      <line x1="480" y1="0" x2="480" y2="320"/>
      <line x1="600" y1="0" x2="600" y2="320"/>
      <line x1="720" y1="0" x2="720" y2="320"/>
      <line x1="840" y1="0" x2="840" y2="320"/>
      <line x1="960" y1="0" x2="960" y2="320"/>
      <line x1="1080" y1="0" x2="1080" y2="320"/>
    </g>

    <!-- Light streaks -->
    <line x1="0" y1="0" x2="380" y2="320" stroke="#00F5FF" stroke-width="0.8" opacity="0.05"/>
    <line x1="1200" y1="0" x2="820" y2="320" stroke="#7B61FF" stroke-width="0.8" opacity="0.05"/>

    <!-- Left neural network -->
    <g opacity="0.18" filter="url(#softGlow)">
      <line x1="95" y1="160" x2="130" y2="130" stroke="#00F5FF" stroke-width="0.8"/>
      <line x1="95" y1="160" x2="130" y2="190" stroke="#00F5FF" stroke-width="0.8"/>
      <line x1="130" y1="130" x2="165" y2="110" stroke="#7B61FF" stroke-width="0.8"/>
      <line x1="130" y1="130" x2="165" y2="155" stroke="#7B61FF" stroke-width="0.8"/>
      <line x1="130" y1="190" x2="165" y2="155" stroke="#7B61FF" stroke-width="0.8"/>
      <line x1="130" y1="190" x2="165" y2="210" stroke="#7B61FF" stroke-width="0.8"/>
      <circle cx="95" cy="160" r="4" fill="#00F5FF"/>
      <circle cx="130" cy="130" r="3" fill="#7B61FF"/>
      <circle cx="130" cy="190" r="3" fill="#7B61FF"/>
      <circle cx="165" cy="110" r="2.5" fill="#00F5FF"/>
      <circle cx="165" cy="155" r="2.5" fill="#00F5FF"/>
      <circle cx="165" cy="210" r="2.5" fill="#00F5FF"/>
    </g>

    <!-- Right neural network -->
    <g opacity="0.18" filter="url(#softGlow)">
      <line x1="1105" y1="160" x2="1070" y2="130" stroke="#7B61FF" stroke-width="0.8"/>
      <line x1="1105" y1="160" x2="1070" y2="190" stroke="#7B61FF" stroke-width="0.8"/>
      <line x1="1070" y1="130" x2="1035" y2="110" stroke="#00F5FF" stroke-width="0.8"/>
      <line x1="1070" y1="130" x2="1035" y2="155" stroke="#00F5FF" stroke-width="0.8"/>
      <line x1="1070" y1="190" x2="1035" y2="155" stroke="#00F5FF" stroke-width="0.8"/>
      <line x1="1070" y1="190" x2="1035" y2="210" stroke="#00F5FF" stroke-width="0.8"/>
      <circle cx="1105" cy="160" r="4" fill="#7B61FF"/>
      <circle cx="1070" cy="130" r="3" fill="#00F5FF"/>
      <circle cx="1070" cy="190" r="3" fill="#00F5FF"/>
      <circle cx="1035" cy="110" r="2.5" fill="#7B61FF"/>
      <circle cx="1035" cy="155" r="2.5" fill="#7B61FF"/>
      <circle cx="1035" cy="210" r="2.5" fill="#7B61FF"/>
    </g>

    <!-- Floating code snippet left -->
    <g opacity="0.22" transform="translate(28, 220)">
      <rect width="155" height="68" rx="6" fill="#1E293B" stroke="#7B61FF" stroke-width="0.6" fill-opacity="0.7"/>
      <text x="10" y="18" font-family="Courier New, monospace" font-size="9" fill="#00F5FF">def predict(X):</text>
      <text x="18" y="31" font-family="Courier New, monospace" font-size="9" fill="#7B61FF">  model = AI(256)</text>
      <text x="18" y="44" font-family="Courier New, monospace" font-size="9" fill="#94A3B8">  return model</text>
      <text x="10" y="57" font-family="Courier New, monospace" font-size="9" fill="#00F5FF">    .fit(X)</text>
    </g>

    <!-- Floating code snippet right -->
    <g opacity="0.22" transform="translate(1017, 50)">
      <rect width="155" height="58" rx="6" fill="#1E293B" stroke="#00F5FF" stroke-width="0.6" fill-opacity="0.7"/>
      <text x="10" y="18" font-family="Courier New, monospace" font-size="9" fill="#7B61FF">const solve = (n) =&gt; {</text>
      <text x="18" y="31" font-family="Courier New, monospace" font-size="9" fill="#00F5FF">  dp[i] = max(</text>
      <text x="26" y="44" font-family="Courier New, monospace" font-size="9" fill="#94A3B8">    dp[i-1], val)</text>
    </g>

    <!-- Geometric accents left -->
    <g filter="url(#softGlow)">
      <polygon points="55,55 70,46 85,55 85,73 70,82 55,73" fill="none" stroke="#00F5FF" stroke-width="1" opacity="0.3"/>
      <polygon points="35,110 47,103 59,110 59,124 47,131 35,124" fill="none" stroke="#7B61FF" stroke-width="0.8" opacity="0.2"/>
    </g>
    <!-- Geometric accents right -->
    <g filter="url(#softGlow)">
      <polygon points="1145,55 1160,46 1175,55 1175,73 1160,82 1145,73" fill="none" stroke="#7B61FF" stroke-width="1" opacity="0.3"/>
      <polygon points="1130,115 1142,108 1154,115 1154,129 1142,136 1130,129" fill="none" stroke="#00F5FF" stroke-width="0.8" opacity="0.2"/>
    </g>

    <!-- Scattered dots -->
    <g fill="#00F5FF" filter="url(#softGlow)">
      <circle cx="200" cy="45" r="2" opacity="0.5"/>
      <circle cx="290" cy="110" r="1.5" opacity="0.4"/>
      <circle cx="180" cy="270" r="2" opacity="0.45"/>
      <circle cx="400" cy="25" r="1.2" opacity="0.35"/>
    </g>
    <g fill="#7B61FF" filter="url(#softGlow)">
      <circle cx="1000" cy="55" r="2" opacity="0.5"/>
      <circle cx="910" cy="130" r="1.5" opacity="0.4"/>
      <circle cx="1020" cy="275" r="2" opacity="0.45"/>
      <circle cx="800" cy="30" r="1.2" opacity="0.35"/>
    </g>

    <!-- Big glow behind name text -->
    <text x="600" y="148" text-anchor="middle"
      font-family="Segoe UI, system-ui, sans-serif"
      font-size="64" font-weight="700" letter-spacing="3"
      fill="#00F5FF" opacity="0.07" filter="url(#bigGlow)">Sumantra Singh</text>

    <!-- Main name -->
    <text x="600" y="148" text-anchor="middle"
      font-family="Segoe UI, system-ui, sans-serif"
      font-size="64" font-weight="700" letter-spacing="3"
      fill="url(#nameGrad)" filter="url(#glow)">Sumantra Singh</text>

    <!-- Accent divider line -->
    <line x1="330" y1="165" x2="870" y2="165" stroke="url(#divLine)" stroke-width="1"/>

    <!-- Subtitle -->
    <text x="600" y="193" text-anchor="middle"
      font-family="Segoe UI, system-ui, sans-serif"
      font-size="15" font-weight="400" letter-spacing="2.5" fill="#64748B">
      AIML Engineer  ·  DSA Enthusiast  ·  Open Source Learner
    </text>

    <!-- Skill badges (centered, total width ~550px) -->
    <!-- HTML -->
    <g transform="translate(325, 220)" filter="url(#softGlow)">
      <rect width="78" height="26" rx="13" fill="#0F172A" stroke="#00F5FF" stroke-width="0.8" fill-opacity="0.85"/>
      <text x="39" y="17.5" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#00F5FF">HTML</text>
    </g>
    <!-- CSS -->
    <g transform="translate(415, 220)" filter="url(#softGlow)">
      <rect width="72" height="26" rx="13" fill="#0F172A" stroke="#7B61FF" stroke-width="0.8" fill-opacity="0.85"/>
      <text x="36" y="17.5" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#7B61FF">CSS</text>
    </g>
    <!-- JavaScript -->
    <g transform="translate(499, 220)" filter="url(#softGlow)">
      <rect width="98" height="26" rx="13" fill="#0F172A" stroke="#00F5FF" stroke-width="0.8" fill-opacity="0.85"/>
      <text x="49" y="17.5" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#00F5FF">JavaScript</text>
    </g>
    <!-- AIML -->
    <g transform="translate(609, 220)" filter="url(#softGlow)">
      <rect width="72" height="26" rx="13" fill="#0F172A" stroke="#7B61FF" stroke-width="0.8" fill-opacity="0.85"/>
      <text x="36" y="17.5" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#7B61FF">AI / ML</text>
    </g>
    <!-- DSA -->
    <g transform="translate(693, 220)" filter="url(#softGlow)">
      <rect width="65" height="26" rx="13" fill="#0F172A" stroke="#00F5FF" stroke-width="0.8" fill-opacity="0.85"/>
      <text x="32.5" y="17.5" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#00F5FF">DSA</text>
    </g>
    <!-- Python -->
    <g transform="translate(770, 220)" filter="url(#softGlow)">
      <rect width="78" height="26" rx="13" fill="#0F172A" stroke="#7B61FF" stroke-width="0.8" fill-opacity="0.85"/>
      <text x="39" y="17.5" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#7B61FF">Python</text>
    </g>

    <!-- Wave divider at bottom blending into GitHub dark mode #0d1117 -->
    <path d="M0,285 C200,305 400,275 600,292 C800,309 1000,279 1200,295 L1200,320 L0,320 Z" fill="#0d1117" opacity="0.95"/>
    <path d="M0,295 C150,308 350,290 600,300 C850,310 1050,292 1200,302 L1200,320 L0,320 Z" fill="#0d1117"/>
  </g>
</svg>
